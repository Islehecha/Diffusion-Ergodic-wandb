data:
  # data_dir: /home/songxy/code/Diffusion-Ergodic/diffusion_ergodic/data/ergodic_dataset_wild_full
  data_dir: /home/songxy/code/Diffusion-Ergodic/diffusion_ergodic/data/ergodic_diagonal
  trajectory_len: 101
  robot_state_dim: 4
  distribution_dim:
  - 32
  - 32
  validation_split: 0.1
  shuffle_dataset: true
  num_workers: 8
  seed: 42
model:
  encoder_depth: 3
  decoder_depth: 6
  num_heads: 6
  hidden_dim: 384
  encoder_drop_path_rate: 0.1
  decoder_drop_path_rate: 0.1
diffusion:
  model_type: x_start
  steps: 20
  beta_min: 0.1
  beta_max: 20.0
  start_point_coef: 10.0
training:
  batch_size: 64
  learning_rate: 0.0001
  lr_scheduler: cosine
  weight_decay: 1.0e-05
  num_epochs: 200
  checkpoint_interval: 10
  visualization_frequency: 10
  device: cuda
  output_dir: /home/songxy/code/Diffusion-Ergodic/diffusion_ergodic_results/
  early_stopping_patience: 20
